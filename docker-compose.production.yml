volumes:
  pg_data_production:
  static_volume:

services:
  db1:
    image: postgres:13.10
    env_file: .env
    volumes:
      - pg_data_production:/var/lib/postgresql/data
  backend:
    image: nvrhd2025/taski_backend 
    env_file: .env
    depends_on:
      - db1
    volumes:
      - static_volume:/backend_static
  frontend:
    env_file: .env
    image: nvrhd2025/taski_frontend
    volumes:
      - static_volume:/frontend_static
    command: cp -r /app/build/. /frontend_static/
  gateway:
    image: nvrhd2025/taski_gateway
    ports:
      - 8000:80
    depends_on:
      - backend
      - frontend
    volumes:
      - static_volume:/staticfiles
